<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding-top: 20%;
            font-family: monospace;
        }
        .error-message {
            font-size: 1.2em;
        }
        /* 隠し文字 */
        .hidden {
            color: #000;
            user-select: auto;
        }
    </style>
</head>
<body>
    <div class="error-message">
        <p>お探しのページは見つかりませんでした。</p>
        <p>URLが間違っているか、削除された可能性があります。</p>
        <br>
        <p class="hidden">探るな。引き返せ。</p>
    </div>
</body>
</html>
